name: final final
options:
  bundleIdPrefix: com.kerim
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

schemes:
  final final:
    build:
      targets:
        final final: all
        QuickLook Extension: all
        final finalTests: [test]
        final finalUITests: [test]
    run:
      config: Debug
      executable: final final
    test:
      config: Debug
      targets:
        - final finalTests
        - final finalUITests

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    majorVersion: 7.0.0

targets:
  final final:
    type: application
    platform: macOS
    sources:
      - path: final final
        excludes:
          - "**/.DS_Store"
          - "Resources/Export"
          - "Resources/editor"
          - "Resources/TinyTeX"
          - "Resources/getting-started.ff"
      - path: final final/Resources/Export
        type: folder
        buildPhase: resources
      - path: final final/Resources/editor
        type: folder
        buildPhase: resources
      - path: final final/Resources/TinyTeX
        type: folder
        buildPhase: resources
      - path: final final/Resources/getting-started.ff
        type: folder
        buildPhase: resources
    preBuildScripts:
      - name: "Clean stale QuickLook DerivedData"
        basedOnDependencyAnalysis: false
        script: |
          # Remove old DerivedData directories that cause duplicate QL extension registrations.
          # Each xcodegen run creates a new project hash → new DerivedData dir → new .appex copy.
          for dd in ~/Library/Developer/Xcode/DerivedData/final_final-*/; do
            if [ "$dd" != "${BUILD_DIR%Build/*}" ]; then
              rm -rf "$dd"
            fi
          done
    postBuildScripts:
      - name: Stamp Git Info into Info.plist
        basedOnDependencyAnalysis: false
        script: |
          PLIST_PATH="${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
          BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
          COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          /usr/libexec/PlistBuddy -c "Add :GitBranch string $BRANCH" "$PLIST_PATH" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :GitBranch $BRANCH" "$PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Add :GitCommit string $COMMIT" "$PLIST_PATH" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :GitCommit $COMMIT" "$PLIST_PATH"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kerim.final-final
        PRODUCT_NAME: FINAL|FINAL
        PRODUCT_MODULE_NAME: final_final
        MARKETING_VERSION: "1"
        CURRENT_PROJECT_VERSION: "0.2.78"
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_IDENTITY: "Developer ID Application"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: HBHZWD24V7
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: final final/final final.entitlements
    dependencies:
      - package: GRDB
      - target: QuickLook Extension
        embed: true
        link: false
    info:
      path: final final/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDisplayName: FINAL|FINAL
        CFBundleName: FINAL|FINAL
        LSMinimumSystemVersion: "26.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        CFBundleURLTypes:
          - CFBundleURLName: com.kerim.final-final
            CFBundleURLSchemes:
              - finalfinal
        CFBundleDocumentTypes:
          - CFBundleTypeName: FINAL|FINAL Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.kerim.final-final.document
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.kerim.final-final.document
            UTTypeDescription: FINAL|FINAL Document
            UTTypeConformsTo:
              - com.apple.package
              - public.composite-content
            UTTypeTagSpecification:
              public.filename-extension:
                - ff
          - UTTypeIdentifier: com.kerim.final-final.section
            UTTypeDescription: Section Transfer
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.mime-type:
                - application/x-final-final-section
          - UTTypeIdentifier: org.textbundle.package
            UTTypeDescription: TextBundle
            UTTypeConformsTo:
              - com.apple.package
            UTTypeTagSpecification:
              public.filename-extension:
                - textbundle

  QuickLook Extension:
    type: app-extension
    platform: macOS
    sources:
      - path: QuickLook Extension
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kerim.final-final.quicklook
        PRODUCT_NAME: QuickLook Extension
        PRODUCT_MODULE_NAME: QuickLook_Extension
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        MARKETING_VERSION: "1"
        CURRENT_PROJECT_VERSION: "0.2.78"
        CODE_SIGN_IDENTITY: "Developer ID Application"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: HBHZWD24V7
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: QuickLook Extension/QuickLook Extension.entitlements
        SKIP_INSTALL: YES
        OTHER_LDFLAGS: ["-lsqlite3"]
    info:
      path: QuickLook Extension/Info.plist
      properties:
        CFBundleDisplayName: FINAL|FINAL Quick Look
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.quicklook.preview
          NSExtensionPrincipalClass: QuickLook_Extension.PreviewViewController
          NSExtensionAttributes:
            QLSupportedContentTypes:
              - com.kerim.final-final.document
            QLSupportsSecureCoding: true

  final finalTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: final finalTests
    dependencies:
      - target: final final
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kerim.final-final-tests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/FINAL|FINAL.app/Contents/MacOS/FINAL|FINAL"
        BUNDLE_LOADER: "$(TEST_HOST)"

  final finalUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: final finalUITests
      - path: final finalTests/Fixtures
        type: folder
        buildPhase: resources
    dependencies:
      - target: final final
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kerim.final-final-uitests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: final final
